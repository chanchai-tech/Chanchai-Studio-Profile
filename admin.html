<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin System | Chanchai Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'JetBrains Mono', monospace;
            background-color: #080c14; 
        }
        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body class="text-slate-300 antialiased selection:bg-cyan-500/30 flex items-center justify-center min-h-screen p-4">

    <div class="glass-card p-8 rounded-2xl w-full max-w-lg mx-4">
        <h2 class="text-2xl font-bold text-white text-center mb-2">CONTENT MANAGER</h2>
        <p class="text-slate-500 text-xs text-center mb-8 uppercase tracking-widest">Firebase Firestore Connected</p>
        
        <div class="mb-6">
            <label class="block text-cyan-400 text-xs font-bold mb-2 uppercase tracking-wider">
                รายละเอียดโปรไฟล์ (Bio)
            </label>
            <textarea id="bioInput" rows="4" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-white focus:outline-none focus:border-cyan-500 transition-colors" placeholder="พิมพ์ข้อความที่ต้องการแสดงบนหน้าเว็บหลัก..."></textarea>
        </div>

        <p id="statusMsg" class="text-center text-sm mb-4 font-bold"></p>

        <div class="flex gap-4">
            <button onclick="saveData()" class="w-full bg-cyan-600 hover:bg-cyan-500 text-white font-bold py-3 rounded-lg transition-colors">
                SAVE DATA
            </button>
            <button onclick="window.location.href='index.html'" class="w-full bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold py-3 rounded-lg transition-colors">
                BACK TO HOME
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        // เปลี่ยนจาก auth มาเรียกใช้ firestore แทน
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA3QrkYw3SBmdLg-wRv6kWk8qTg_y3zddU",
            authDomain: "chanchai-studio-main.firebaseapp.com",
            projectId: "chanchai-studio-main",
            storageBucket: "chanchai-studio-main.firebasestorage.app",
            messagingSenderId: "545915470143",
            appId: "1:545915470143:web:c8acb390afbba7efba938a"
        };

        // เชื่อมต่อแอปและฐานข้อมูล
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ฟังก์ชันเมื่อกดปุ่ม SAVE
        window.saveData = async function() {
            const newText = document.getElementById('bioInput').value;
            const statusMsg = document.getElementById('statusMsg');
            
            if(!newText) {
                statusMsg.innerText = "กรุณาพิมพ์ข้อความก่อนบันทึกครับ!";
                statusMsg.className = "text-yellow-400 text-center mb-4 font-bold";
                return;
            }

            statusMsg.innerText = "กำลังบันทึกข้อมูลไปที่ Google...";
            statusMsg.className = "text-cyan-400 text-center mb-4 font-bold";

            try {
                // คำสั่ง setDoc คือการเอาข้อมูลไปวางใน Firestore
                // สร้าง Folder ชื่อ "portfolio" และไฟล์ชื่อ "profile"
                await setDoc(doc(db, "portfolio", "profile"), {
                    bioText: newText,
                    lastUpdated: new Date().toLocaleString('th-TH')
                });
                
                statusMsg.innerText = "บันทึกข้อมูลสำเร็จ! ข้อมูลอยู่ในฐานข้อมูลแล้ว ✅";
                statusMsg.className = "text-green-400 text-center mb-4 font-bold";
            } catch (error) {
                console.error("Error:", error);
                statusMsg.innerText = "เกิดข้อผิดพลาด: " + error.message;
                statusMsg.className = "text-red-400 text-center mb-4 font-bold";
            }
        };
    </script>
</body>
</html>
